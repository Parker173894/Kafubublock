{% extends 'base.html' %}{% block content %}<section class="auth"><form method="post" enctype="multipart/form-data" class="form-card wide"><h2>Upload Department Material</h2><label>Title</label><input name="title" required><label>Description</label><textarea name="description"></textarea><label>Department</label><select name="department" required>{% for key,name in DEPARTMENTS.items() %}{% if not allowed_dept or allowed_dept==key %}<option value="{{ key }}">{{ name }}</option>{% endif %}{% endfor %}</select><label>File</label><input type="file" name="file" required><button class="btn">Upload</button></form></section>{% endblock %}
