{% extends 'base.html' %}
{% block content %}
<section class="auth">
  <form method="post" class="form-card wide-card">
    <h2>Create New Password</h2>
    <p class="hint">Account: <b>{{ full_name }}</b>. Create a strong new password.</p>

    <label>New Password</label>
    <input type="password" name="new_password" required>

    <label>Confirm New Password</label>
    <input type="password" name="confirm_password" required>

    <p class="note">Password must have at least 8 characters, one capital letter, one small letter and one number.</p>
    <button class="btn" type="submit">Change Password</button>
  </form>
</section>
{% endblock %}
